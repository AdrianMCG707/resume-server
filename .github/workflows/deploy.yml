name: CI/CD — Test and Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: webserver_db
          POSTGRES_USER: webuser
          POSTGRES_PASSWORD: webpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/webserver_db
          SPRING_DATASOURCE_USERNAME: webuser
          SPRING_DATASOURCE_PASSWORD: webpassword
          JWT_SECRET: 7a9f3c2e8b1d4f6a0e5c9b2d7f4a1e8c3b6d9f2a5e0c7b4d1f8a3e6c9b2d5f8a
          JWT_EXPIRATION: 86400000
        run: ./mvnw test

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}